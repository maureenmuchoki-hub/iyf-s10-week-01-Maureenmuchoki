<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input { margin: 5px; }
        button { margin-top: 10px; }
        #report { margin-top: 20px; padding: 10px; border: 1px solid #333; width: 400px; }
    </style>
</head>
<body>
    <h1>Student Grade Tracker</h1>

    <label>Student Name: <input type="text" id="name" placeholder="Enter name"></label><br>
    <label>Math: <input type="number" id="math" placeholder="0-100"></label><br>
    <label>English: <input type="number" id="english" placeholder="0-100"></label><br>
    <label>Science: <input type="number" id="science" placeholder="0-100"></label><br>
    <label>Computer Studies: <input type="number" id="computer" placeholder="0-100"></label><br>


    <button onclick="generateReport()">Generate Report</button>

    <div id="report"></div>

    <script>
        function generateReport() {
    // Get input values
    const name = document.getElementById("name").value.trim();
    const math = Number(document.getElementById("math").value);
    const english = Number(document.getElementById("english").value);
    const science = Number(document.getElementById("science").value);
    const computer = Number(document.getElementById("computer").value);

    // Validate input
    if (!name || isNaN(math) || isNaN(english) || isNaN(science) || isNaN(computer)) {
        alert("Please fill in all fields with valid numbers!");
        return;
    }

    // Calculate average
    const average = ((math + english + science + computer) / 4).toFixed(2);

    // Determine letter grade
    let letterGrade = "";
    if (average >= 85) letterGrade = "A";
    else if (average >= 75) letterGrade = "B";
    else if (average >= 65) letterGrade = "C";
    else if (average >= 50) letterGrade = "D";
    else letterGrade = "F";

    // Display report
    const reportDiv = document.getElementById("report");
    reportDiv.innerHTML = `
        <h2>Report Card for ${name}</h2>
        <p>Math: ${math}</p>
        <p>English: ${english}</p>
        <p>Science: ${science}</p>
        <p>Computer Studies: ${computer}</p>
        <p><strong>Average: ${average}</strong></p>

        <p><strong>Letter Grade: ${letterGrade}</strong></p>
    `;
} 

    </script>

</body>
</html>
